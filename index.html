<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Deal Coin</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header id="topbar">
      <h1>Deal Coin</h1>
      <div class="stats">
        <div class="stat"><span class="label">スコア</span><span id="score" class="value">0</span></div>
        <div class="stat"><span class="label">最大</span><span id="maxcoin" class="value">0</span></div>
        <div class="stat"><span class="label">ハイスコア</span><span id="highscore" class="value">0</span></div>
      </div>
    </header>

    <div id="board-wrap">
      <main id="board" aria-label="盤面"></main>
    </div>

    <footer id="controls">
      <button id="deal-btn" class="btn primary">ディール</button>
      <button id="new-btn" class="btn">はじめから</button>
    </footer>

    <p id="message" role="status" aria-live="polite"></p>
  </div>

  <script src="game.js"></script>
</body>
</html>
